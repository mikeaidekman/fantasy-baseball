name: Build Team Lookup Table

on:
  workflow_dispatch:    # Manual trigger only

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-oauthlib pandas

      - name: Restore Yahoo token
        env:
          YAHOO_TOKEN: ${{ secrets.YAHOO_TOKEN }}
        run: echo "$YAHOO_TOKEN" > .yahoo_token.json

      - name: Build dim_team.csv
        env:
          YAHOO_CLIENT_ID:     ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
        run: python build_dim_team.py

      - name: Commit dim_team.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dim_team.csv
          git diff --staged --quiet || git commit -m "Update dim_team.csv $(date +%Y-%m-%d)"
          git push
